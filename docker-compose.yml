services:
  db:
    image: postgres:15
    container_name: pv-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pv_agent
      POSTGRES_USER: pv_agent
      POSTGRES_PASSWORD: pv_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pv-agent:
    build: .
    container_name: pv-agent-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./reports:/app/reports
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: python -m app.main scheduler

volumes:
  postgres_data: